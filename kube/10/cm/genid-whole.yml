---
kind: Pod
apiVersion: v1
metadata:
  name: genid-stone
spec:
  containers:
  - name: fakeid
    image: smlinux/genid:env
    volumeMounts:
    - name: html
      mountPath: /webdata
    envFrom:
    - configMapRef:
        name: myconfigmap
  - name: web-server
    image: nginx:1.24
    ports:
    - containerPort: 80
    volumeMounts:
    - name:  html
      mountPath:  /usr/share/nginx/html
  volumes:
  - name:  html
    emptyDir: {}
