---
kind: Secret
apiVersion: v1
metadata:
  name: db-secret
type: Opaque
data:
  db_password: "cGFzc3dvcmQ="

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: db-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db-container
        image: postgres:18.0
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: db_password
---
kind: Service
apiVersion: v1
metadata:
  name: db-svc
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
  - port: 5432
    targetPort: 5432
